<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 검색어 생성 3</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 버튼 영역 공통 스타일 */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 0;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-submit {
            background-color: #007bff;
            color: white;
            border: none;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            border: none;
        }

        /* 메인 콘텐츠 영역 (좌우 배치) */
        .main-content-item {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .text-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .text-section h2 {
            font-size: 18px;
            color: #333;
        }
        .text-section textarea {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <!-- 상단 버튼 영역 -->
    <div class="button-container">
        <button class="btn btn-submit">생성</button>
        <button class="btn btn-cancel">취소</button>
        <button class="btn btn-content-cancel">내용초기화</button>
    </div>

    <!-- 메인 콘텐츠 영역 (텍스트 에어리어) -->
    <main id="mainContentArea" class="main-content-area">
      <div class="main-content-item">
        <!-- 검색어 영역 -->
        <section class="text-section">
            <h2>검색 텍스트</h2>
            <textarea rows="10" id="searchText" placeholder="항목별로 붙일 상단 텍스트를 입력하세요...">검색어</textarea>
        </section>
      </div>
      <hr />
      <div class="main-content-item">
        <!-- AI 검색 NodeJS 소스코드 생성 영역 -->
        <section class="text-section">
            <h2>AI 검색 NodeJS 소스코드 생성 텍스트</h2>
            <textarea rows="10" id="aiSearchNodejsSourceText" placeholder="AI 검색 NodeJS 소스코드 생성 텍스트를 복사하세요..." onclick="this.select();"></textarea>
        </section>
      </div>
      <hr />
      <div id="mainContentBodyArea" class="main-content-body-area"></div>
    </main>

    <!-- 하단 버튼 영역 -->
    <div class="button-container">
        <button class="btn btn-submit">생성</button>
        <button class="btn btn-cancel">취소</button>
        <button class="btn btn-content-cancel">내용초기화</button>
    </div>

<script>
const RESULT_INPUTBOX_COUNT_CONST = 12;
//---
var mainContentAreaJqueryObject = $('#mainContentArea');
var mainContentBodyAreaJqueryObject = $('#mainContentBodyArea');
var searchTextJqueryObject = $('#searchText');
var aiSearchNodejsSourceTextJqueryObject = $('#aiSearchNodejsSourceText');
//---
$(function(){
  fnInitPage();
  //---
  $('.btn-submit').click(function(e){
    fnCreateCode();
  });
  //---
  $('.btn-cancel').click(function(e){
    fnCancel();
  });
  //---
  $('.btn-content-cancel').click(function(e){
    fnCancelContent();
  });
});
//---
function fnInitPage(){
  var htmlBuffers = [];
  var htmlString = '';
  var forIndex = 0;
  var forNumber = 0;
  //---
  for(forIndex = 0;forIndex < RESULT_INPUTBOX_COUNT_CONST;forIndex++){
    forNumber = forIndex + 1;
    //---
    htmlBuffers.push(`
        <div class="main-content-item">
          <section class="text-section">
              <h2>${forNumber}. 변환된 텍스트</h2>
              <textarea rows="10" id="resultText${forNumber}" placeholder="결과가 여기에 표시됩니다..." onclick="this.select();"></textarea>
          </section>
        </div>
    `);
  }//for
  //---
  htmlString = htmlBuffers.join('\n');
  mainContentBodyAreaJqueryObject.html(htmlString);
}
function fnCreateCode(){
  var forIndex = 0;
  var forNumber = 0;
  var searchTextString = '';
  var resultTextString = '';
  var resultTextJqueryObject = null;
  var aiSearchNodejsSourceTextArray = null;
  var aiSearchNodejsSourceTextString = '';
  //---
  searchTextString = searchTextJqueryObject.val();
  aiSearchNodejsSourceTextArray = [];
  //---
  for(forIndex = 0;forIndex < RESULT_INPUTBOX_COUNT_CONST;forIndex++){
    forNumber = forIndex + 1;
    resultTextString = '';
    //---
    resultTextJqueryObject = $(`#resultText${forNumber}`);
    //---
    if(forNumber===1){
      resultTextString = `${searchTextString} 관련 상세내용 작성`;
    }else if(forNumber===2){
      resultTextString = `${searchTextString} 관련 10개의 장으로 나누어서, 각 장별 내용 작성`;
    }else{
      resultTextString = `${forNumber - 2} 장 상세내용 작성`;
    }//if
    //---
    resultTextJqueryObject.val(resultTextString);
	aiSearchNodejsSourceTextArray.push(resultTextString);
  }//for forIndex
  //---
  aiSearchNodejsSourceTextString = getAiSearchTextTemplateString(aiSearchNodejsSourceTextArray);
  aiSearchNodejsSourceTextJqueryObject.val(aiSearchNodejsSourceTextString);
}
function fnCancel(){
  if(confirm('입력을 초기화 하시겠습니까?')){
    location.href = 'aiSearch2.html';
  }//if
}
function fnCancelContent(){
  var forIndex = 0;
  var forNumber = 0;
  var resultTextJqueryObject = null;
  //---
  if(confirm('내용부분 입력을 초기화 하시겠습니까?')){
	  for(forIndex = 0;forIndex < RESULT_INPUTBOX_COUNT_CONST;forIndex++){
		forNumber = forIndex + 1;
		//---
		resultTextJqueryObject = $(`#resultText${forNumber}`);
		//---
		resultTextJqueryObject.val('');
	  }//for forIndex
  }//if
}
function getAiSearchTextTemplateString(aiSearchTextArray=null){
	const templateResultString2DivConstString = '\nconsole.log("----------------------------- (결과구분선)");  ';
	//---
	var aiSearchTextString = '';
	var templateResultString1 = '';
	var templateResultString1Array = null;
	var templateResultString1ArrayCount = 0;
	var templateResultString1ArrayIndex = 0;
	var templateResultString1ArrayNumber = 0;
	var templateResultString1ItemString = '';
	var templateResultString2 = '';
	var templateResultString2Array = null;
	var templateResultString2ArrayCount = 0;
	var templateResultString2ArrayIndex = 0;
	var templateResultString2ArrayNumber = 0;
	var templateResultString2ItemString = '';
	var aiSearchTextArrayCount = 0;
	var aiSearchTextArrayIndex = 0;
	var aiSearchTextArrayNumber = 0;
	var aiSearchTextArrayNumberString = '';
	var aiSearchTextArrayItemString = 0;
	var returnStringValue = '';
	//---
	templateResultString1Array = [];
	templateResultString2Array = [];
	//---
	if(!aiSearchTextArray){return '';}//if
	aiSearchTextArrayCount = aiSearchTextArray.length;
	//---
	aiSearchTextString = 
`import { GoogleGenAI } from "@google/genai";
/*
nodejs 에서 프로젝트 폴더 생성.
---
appTemp.js 파일 생성.
생성 소스코드 붙여넣기.
*** 키값셋팅 필수(중요) ***
---
구글 지미니 AI 라이브러리, 프로젝트폴더에 설치
npm install @google/genai
---
기본 지미니 api 호출 소스코드 매뉴얼
https://ai.google.dev/gemini-api/docs/get-started
---
윈도우 cmd 에서 다음 키값 셋팅 실행. 환경변수 셋팅.
set GEMINI_API_KEY="API키값"
---
구글 지미니 api 키값 갱신
https://aistudio.google.com/api-keys
---
AI js 파일 프로젝트 폴더 경로
D:/project/nodejs/geminiApiSample2
---
윈도우 cmd 창에서, 다음 명령 수행
d:
cd D:/project/nodejs/geminiApiSample2
node appTemp.js > appTempResult.txt
*/

const delayMsec = 20000;

//const ai = new GoogleGenAI({});
const ai = new GoogleGenAI({ apiKey: "API키값" });

{{templateResultString1}}
{{templateResultString2}}
`;
	//--- 템플릿 결과문자열 생성
	for(aiSearchTextArrayIndex = 0; aiSearchTextArrayIndex < aiSearchTextArrayCount; aiSearchTextArrayIndex++){
		aiSearchTextArrayNumber = aiSearchTextArrayIndex + 1;
		aiSearchTextArrayNumberString = aiSearchTextArrayNumber.toString();
		aiSearchTextArrayItemString = aiSearchTextArray[aiSearchTextArrayIndex];
		//--- 템플릿 결과문자열1 생성
		templateResultString1ItemString = 
`const interaction{{aiSearchTextArrayNumberString}} = await ai.interactions.create({
  model: "gemini-3.5-flash",
  input: "{{aiSearchTextArrayItemString}}",
});
await new Promise(resolve => setTimeout(resolve, delayMsec));
//---`;
		templateResultString1ItemString = templateResultString1ItemString.replaceAll('{{aiSearchTextArrayNumberString}}',aiSearchTextArrayNumberString);
		templateResultString1ItemString = templateResultString1ItemString.replaceAll('{{aiSearchTextArrayItemString}}',aiSearchTextArrayItemString);
		//--- 템플릿 결과문자열2 생성
		templateResultString2ItemString = 
`console.log(interaction{{aiSearchTextArrayNumberString}}.output_text);{{templateResultString2DivConstString}}`;
		templateResultString2ItemString = templateResultString2ItemString.replaceAll('{{aiSearchTextArrayNumberString}}',aiSearchTextArrayNumberString);
		if(aiSearchTextArrayNumber===aiSearchTextArrayCount){
			templateResultString2ItemString = templateResultString2ItemString.replaceAll('{{templateResultString2DivConstString}}','');
		}else{
			templateResultString2ItemString = templateResultString2ItemString.replaceAll('{{templateResultString2DivConstString}}',templateResultString2DivConstString);
		}//if
		//---	
		templateResultString1Array.push(templateResultString1ItemString);
		templateResultString2Array.push(templateResultString2ItemString);
	}//for
	templateResultString1 = templateResultString1Array.join('\n');
	templateResultString2 = templateResultString2Array.join('\n');
	//--- 템플릿 결과문자열 치환
	aiSearchTextString = aiSearchTextString.replaceAll('{{templateResultString1}}',templateResultString1);
	aiSearchTextString = aiSearchTextString.replaceAll('{{templateResultString2}}',templateResultString2);
	//--- return value
	returnStringValue = aiSearchTextString;
	return returnStringValue;
}
</script>
</body>
</html>
